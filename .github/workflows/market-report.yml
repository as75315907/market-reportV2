name: Market Report to Google Sheet (Mon-Fri by 17:00 Taipei)

on:
  # 目標：17:00 前完成更新
  # 16:00 + 16:15 台北兩次觸發（備援），搭配 Python 的 L3 去重避免重複跑
  schedule:
    - cron: "0 8 * * 1-5"    # 08:00 UTC = 16:00 Asia/Taipei
    - cron: "15 8 * * 1-5"   # 08:15 UTC = 16:15 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      DEBUG_HKEX: "0"

      # 你的 GCP 專案（WIF 後建議明確固定）
      GCP_PROJECT_ID: stellar-fx-488510-b0

      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_TAB: ${{ secrets.GSHEET_TAB }}
      GSHEET_SHEET_NAME: ${{ secrets.GSHEET_SHEET_NAME || 'IR_updated (PC HOME)' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ WIF Auth（免 key）
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/184144369174/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "gh-dispatcher-sa@stellar-fx-488510-b0.iam.gserviceaccount.com"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set gcloud project
        run: |
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud auth list

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug env presence (no secret content)
        run: |
          python - << 'PY'
          import os
          def info(k):
            v = os.getenv(k)
            if v is None:
              return f"{k}=<MISSING>"
            return f"{k}=<SET len={len(v)}>"
          print(info("GSHEET_ID"))
          print(info("GSHEET_TAB"))
          print(info("GSHEET_SHEET_NAME"))
          print(info("GCP_PROJECT_ID"))
          PY

      - name: Run report -> Google Sheet
        timeout-minutes: 30
        run: |
          rm -f tw_suffix_cache.json
          rm -f skipped.txt
          python daily_market_report_to_gsheet.py

      - name: Check skipped
        if: always()
        shell: bash
        run: |
          if [ -f skipped.txt ]; then
            echo "SKIPPED=1" >> $GITHUB_ENV
            echo "This run is skipped (already updated today)."
          else
            echo "SKIPPED=0" >> $GITHUB_ENV
            echo "This run executed update normally."
          fi

      - name: Prepare email body
        if: success() && env.SKIPPED != '1'
        run: |
          echo "MAIL_SUBJECT=✅ Daily Market Report 更新成功 - ${{ github.run_id }}" >> $GITHUB_ENV
          {
            echo "✅ 更新成功"
            echo "更新執行時間（台北）：$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "更新日期（台北）：$(TZ=Asia/Taipei date '+%Y-%m-%d')"
            echo ""
            echo "Repo: ${{ github.repository }}"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.run_id }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "Google Sheet: ${{ secrets.GSHEET_SHEET_NAME }}"
          } > mail_body.txt

          echo "MAIL_BODY<<EOF" >> $GITHUB_ENV
          cat mail_body.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Email on success
        if: success() && env.SKIPPED != '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: ${{ env.MAIL_SUBJECT }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USER }}
          body: ${{ env.MAIL_BODY }}

      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "❌ Daily Market Report 更新失敗 - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USER }}
          body: |
            ❌ 更新失敗
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_id }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            請到 GitHub Actions 查看 log：
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
