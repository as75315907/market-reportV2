name: Market Report to Google Sheet (Mon-Fri 17:30 Taipei)

on:
  schedule:
    - cron: "0 9 * * 1-5"  # 09:00 UTC = 17:00 Asia/Taipei (解法A：提早觸發)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      DEBUG_HKEX: "0"

      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_TAB: ${{ secrets.GSHEET_TAB }}
      GSHEET_SHEET_NAME: ${{ secrets.GSHEET_SHEET_NAME }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug env presence (no secret content)
        run: |
          python - << 'PY'
          import os
          def info(k):
            v = os.getenv(k)
            if v is None:
              return f"{k}=<MISSING>"
            return f"{k}=<SET len={len(v)}>"
          print(info("GSHEET_ID"))
          print(info("GSHEET_TAB"))
          print(info("GCP_SA_JSON"))
          PY

      - name: Wait until 17:30 Asia/Taipei
        shell: bash
        run: |
          set -e
          echo "Now (Taipei): $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"
          TODAY=$(TZ=Asia/Taipei date +%F)

          NOW_TS=$(TZ=Asia/Taipei date +%s)
          TARGET_TS=$(TZ=Asia/Taipei date -d "${TODAY} 17:30:00" +%s)

          if [ "${NOW_TS}" -lt "${TARGET_TS}" ]; then
            SLEEP_SEC=$((TARGET_TS - NOW_TS))
            if [ "${SLEEP_SEC}" -gt 0 ] && [ "${SLEEP_SEC}" -lt 10800 ]; then
              echo "Sleeping ${SLEEP_SEC}s until ${TODAY} 17:30 Taipei..."
              sleep "${SLEEP_SEC}"
            fi
          else
            echo "Already past 17:30 Taipei, continue."
          fi

          echo "Start run (Taipei): $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Run report -> Google Sheet
        run: |
          rm -f tw_suffix_cache.json
          rm -f skipped.txt
          python daily_market_report_to_gsheet.py

      # ✅ 去重：Python 若判定今天已更新，會寫 skipped.txt
      - name: Check skipped
        if: always()
        shell: bash
        run: |
          if [ -f skipped.txt ]; then
            echo "SKIPPED=1" >> $GITHUB_ENV
            echo "This run is skipped (already updated today)."
          else
            echo "SKIPPED=0" >> $GITHUB_ENV
            echo "This run executed update normally."
          fi

      - name: Prepare email body
        if: success() && env.SKIPPED != '1'
        run: |
          echo "MAIL_SUBJECT=✅ Daily Market Report 更新成功 - ${{ github.run_id }}" >> $GITHUB_ENV
          {
            echo "✅ 更新成功"
            echo "更新執行時間（台北）：$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "更新日期（台北）：$(TZ=Asia/Taipei date '+%Y-%m-%d')"
            echo ""
            echo "Repo: ${{ github.repository }}"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.run_id }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "Google Sheet: ${{ secrets.GSHEET_SHEET_NAME }}"
          } > mail_body.txt

          echo "MAIL_BODY<<EOF" >> $GITHUB_ENV
          cat mail_body.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Email on success
        if: success() && env.SKIPPED != '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: ${{ env.MAIL_SUBJECT }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USER }}
          body: ${{ env.MAIL_BODY }}

      # ✅ Skip 的情況不寄失敗信（因為不會是 failure()）
      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "❌ Daily Market Report 更新失敗 - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USER }}
          body: |
            ❌ 更新失敗
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_id }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            請到 GitHub Actions 查看 log：
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
