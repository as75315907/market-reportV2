name: Market Report to Google Sheet (Mon-Fri 17:30 Taipei)

on:
  schedule:
    - cron: "30 9 * * 1-5"  # 09:30 UTC = 17:30 Asia/Taipei
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      DEBUG_HKEX: "0"

      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_TAB: ${{ secrets.GSHEET_TAB }}
      GSHEET_SHEET_NAME: ${{ secrets.GSHEET_SHEET_NAME }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Debug env presence (no secret content)
        run: |
          python - << 'PY'
          import os
          def info(k):
            v = os.getenv(k)
            if v is None:
              return f"{k}=<MISSING>"
            return f"{k}=<SET len={len(v)}>"
          print(info("GSHEET_ID"))
          print(info("GSHEET_TAB"))
          print(info("GCP_SA_JSON"))
          PY
      - name: Run report -> Google Sheet
        run: |
          rm -f tw_suffix_cache.json
          python daily_market_report_to_gsheet.py
