name: Market Report (Mon-Fri 17:30 Taipei)

on:
  schedule:
    - cron: "30 9 * * 1-5"  # 09:30 UTC = 17:30 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      DEBUG_HKEX: "0"
      OUTPUT_DIR: "reports"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_TAB: ${{ secrets.GSHEET_TAB }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check SMTP env exists (no secrets printed)
        run: |
          python - <<'PY'
          import os
          keys = ["SMTP_HOST","SMTP_PORT","SMTP_USER","SMTP_APP_PASSWORD","MAIL_TO"]
          for k in keys:
            v = os.getenv(k)
            print(k, "OK" if (v and v.strip()) else "MISSING")
          PY
      - name: Run report
        run: |
          rm -f tw_suffix_cache.json
          python daily_market_report_to_gsheet.py
          ls -la reports

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-report
          path: reports/Daily_Market_Report_*.xlsx
          if-no-files-found: error

      - name: Commit to reports branch
        run: |
          set -e
          DATE="$(date +'%Y-%m-%d')"
          FILE="reports/Daily_Market_Report_${DATE}.xlsx"

          if [ ! -f "$FILE" ]; then
            echo "Report file not found: $FILE"
            ls -la reports
            exit 1
          fi

          # 第一次遠端沒有 reports 分支也沒關係
          git fetch origin reports || true

          # 切到 reports 分支；沒有就建立 orphan 分支
          git switch reports || git switch --orphan reports

          # 只保留 reports/（乾淨）
          mkdir -p reports
          git add "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Market report ${DATE}" || echo "No changes to commit"
          git push -u origin reports
