name: Market Report (Mon-Fri 17:30 Taipei)

on:
  schedule:
    - cron: "30 9 * * 1-5"  # 09:30 UTC = 17:30 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      DEBUG_HKEX: "0"
      OUTPUT_DIR: "reports"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run report
        run: |
          python daily_market_report_turnover_twse_fmtqik_hkex_v3_fixhk6_dailyoverwrite.py
          ls -la reports

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-report
          path: reports/Daily_Market_Report_*.xlsx
          if-no-files-found: error

      - name: Commit to reports branch
        run: |
          set -e
          DATE="$(date +'%Y-%m-%d')"
          FILE="reports/Daily_Market_Report_${DATE}.xlsx"

          if [ ! -f "$FILE" ]; then
            echo "Report file not found: $FILE"
            ls -la reports
            exit 1
          fi

          git fetch origin reports:reports || true
          git switch reports || git switch --orphan reports

          mkdir -p reports
          cp -f "$FILE" "reports/Daily_Market_Report_${DATE}.xlsx"

          git add "reports/Daily_Market_Report_${DATE}.xlsx"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Market report ${DATE}" || echo "No changes to commit"
          git push origin reports
